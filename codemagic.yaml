workflows:

  # ─── iOS → Appetize.io (simulador, sin Apple Developer Account) ─────────────
  # Genera un .app para simulador iOS y lo sube a Appetize.io para demo.
  # No requiere certificados ni cuenta de desarrollador de Apple.
  #
  # Variables en Codemagic Dashboard → Environment variables:
  #   APPETIZE_API_TOKEN  → Tu API token de appetize.io (Settings → API token)
  # ────────────────────────────────────────────────────────────────────────────

  ios-appetize:
    name: iOS → Appetize.io (demo)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APPETIZE_API_TOKEN: $APPETIZE_API_TOKEN

    scripts:
      - name: Instalar dependencias
        script: flutter pub get

      - name: Resolver pods de iOS
        script: |
          cd ios
          pod install

      - name: Compilar para simulador iOS
        script: |
          flutter build ios --debug --simulator

      - name: Comprimir .app para Appetize
        script: |
          cd build/ios/iphonesimulator
          zip -r MegaVital.zip Runner.app

      - name: Subir a Appetize.io
        script: |
          curl https://api.appetize.io/v1/apps \
            -H "Authorization: Token $APPETIZE_API_TOKEN" \
            -F "file=@build/ios/iphonesimulator/MegaVital.zip" \
            -F "platform=ios" \
            -F "note=Mega Vital demo build"

    artifacts:
      - build/ios/iphonesimulator/MegaVital.zip


  # ─── iOS → TestFlight ───────────────────────────────────────────────────────
  # Compila la app para iPhone y la sube a TestFlight automáticamente.
  # NO toca nada de Android.
  #
  # Variables que debes configurar en Codemagic Dashboard → Environment variables:
  #   APP_STORE_CONNECT_KEY_IDENTIFIER  → Key ID de tu App Store Connect API key
  #   APP_STORE_CONNECT_ISSUER_ID       → Issuer ID de App Store Connect
  #   APP_STORE_CONNECT_PRIVATE_KEY     → Contenido del archivo .p8 (API key)
  #   CERTIFICATE_PRIVATE_KEY           → Clave privada del certificado de distribución
  # ────────────────────────────────────────────────────────────────────────────

  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.gymApp  # Cambia esto por tu bundle ID real
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        CERTIFICATE_PRIVATE_KEY: $CERTIFICATE_PRIVATE_KEY

    scripts:
      - name: Instalar dependencias
        script: flutter pub get

      - name: Verificar íconos iOS (sin canal alfa)
        script: |
          python3 - <<'PYEOF'
          import struct, sys, os
          def has_alpha(path):
              with open(path, 'rb') as f:
                  f.read(8)
                  ct = None; trns = False
                  while True:
                      d = f.read(8)
                      if len(d) < 8: break
                      length, ctype = struct.unpack('>I4s', d)
                      ctype = ctype.decode('ascii')
                      data = f.read(length); f.read(4)
                      if ctype == 'IHDR': ct = data[9]
                      if ctype == 'tRNS': trns = True
              return ct in (4, 6) or (ct == 3 and trns)
          icon_dir = 'ios/Runner/Assets.xcassets/AppIcon.appiconset'
          bad = [f for f in os.listdir(icon_dir) if f.endswith('.png') and has_alpha(os.path.join(icon_dir, f))]
          if bad:
              print('ERROR: Íconos con canal alfa detectados (Apple los rechazará):')
              for f in bad: print(f'  {f}')
              print('Regenera los íconos desde una imagen fuente RGB sin alfa.')
              sys.exit(1)
          print(f'OK: {len(os.listdir(icon_dir))} íconos sin canal alfa.')
          PYEOF

      - name: Resolver pods de iOS
        script: |
          cd ios
          pod install

      - name: Compilar iOS (release)
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true


  # ─── iOS → Subir App Preview (video) a App Store Connect ────────────────────
  # Sube un archivo de video (.mp4 / .mov) como App Preview en el listing
  # de la App Store. NO compila la app.
  #
  # Coloca el video en:  assets/app_preview/preview.mp4  (o cambia VIDEO_PATH)
  #
  # Variables en Codemagic Dashboard → Environment variables:
  #   APP_STORE_CONNECT_KEY_IDENTIFIER  → Key ID de tu App Store Connect API key
  #   APP_STORE_CONNECT_ISSUER_ID       → Issuer ID de App Store Connect
  #   APP_STORE_CONNECT_PRIVATE_KEY     → Contenido del archivo .p8
  #   BUNDLE_ID                          → Bundle ID real (ej. com.vallejoj.megavital)
  #
  # Opcionales (con defaults):
  #   VIDEO_PATH          → Ruta al video (default: assets/app_preview/preview.mp4)
  #   APP_LOCALE          → Locale del listing (default: es-MX)
  #   PREVIEW_SCREEN_SIZE → Tipo de pantalla (default: APP_IPHONE_67)
  # ────────────────────────────────────────────────────────────────────────────

  ios-upload-app-preview:
    name: iOS → Subir App Preview a App Store Connect
    max_build_duration: 15
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        BUNDLE_ID: $BUNDLE_ID
        VIDEO_PATH: ${VIDEO_PATH:-assets/app_preview/preview.mp4}
        APP_LOCALE: ${APP_LOCALE:-es-MX}
        PREVIEW_SCREEN_SIZE: ${PREVIEW_SCREEN_SIZE:-APP_IPHONE_67}

    scripts:
      - name: Instalar dependencias Python
        script: |
          pip3 install --quiet PyJWT cryptography requests

      - name: Verificar archivo de video
        script: |
          if [ ! -f "$VIDEO_PATH" ]; then
            echo "ERROR: Video no encontrado en '$VIDEO_PATH'"
            echo "Coloca tu video en esa ruta y vuelve a ejecutar el workflow."
            exit 1
          fi
          echo "Video encontrado: $VIDEO_PATH ($(du -h "$VIDEO_PATH" | cut -f1))"
          # Validar duración: App Store acepta de 15 a 30 segundos
          if command -v ffprobe &>/dev/null; then
            DURATION=$(ffprobe -v error -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 "$VIDEO_PATH" 2>/dev/null | cut -d. -f1)
            echo "Duración del video: ${DURATION}s"
            if [ "$DURATION" -lt 15 ] || [ "$DURATION" -gt 30 ]; then
              echo "ADVERTENCIA: App Store requiere videos de 15-30 segundos (detectado: ${DURATION}s)"
            fi
          fi

      - name: Subir App Preview a App Store Connect
        script: |
          python3 scripts/upload_app_preview.py
