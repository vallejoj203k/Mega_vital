name: mega_vital
description: Mega Vital - Professional Gym & Wellness App
publish_to: 'none'
version: 1.0.0+8

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  http: ^1.2.2
  percent_indicator: ^4.2.3
  image_picker: ^1.0.7
  supabase_flutter: ^2.8.4
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/body_front.png
    - assets/images/body_back.png
    - assets/images/frontal_masculino.png
    - assets/images/trasero_masculino.png
    - assets/images/instructors/
    # Animaciones de ejercicios — agregar la carpeta aquí cuando tengas el primer MP4:
    - assets/animations/exercises/pectoral/
    # - assets/animations/exercises/hombros/
    # - assets/animations/exercises/biceps/
    # - assets/animations/exercises/triceps/
    # - assets/animations/exercises/espalda/
    # - assets/animations/exercises/dorsales/
    # - assets/animations/exercises/lumbar/
    # - assets/animations/exercises/abdominales/
    # - assets/animations/exercises/cuadriceps/
    # - assets/animations/exercises/gemelos/
    # - assets/animations/exercises/gluteos/
    # - assets/animations/exercises/isquiotibiales/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
